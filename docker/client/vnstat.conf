// vnstat configuration file

// Database directory
DatabaseDir "/var/lib/vnstat"

// Log file location
LogFile "/var/log/vnstat/vnstat.log"

// PID file location
PidFile "/var/run/vnstat/vnstat.pid"

// Update interval in seconds
UpdateInterval 30

// Poll interval in seconds
PollInterval 5

// Save interval in seconds
SaveInterval 5

// Boot variation in seconds
BootVariation 15

// Trafficless entries
TrafficlessEntries 1

// Interface order
InterfaceOrder 0

// Rate unit (0 = bytes, 1 = bits)
RateUnit 1

// Maximum bandwidth
MaxBandwidth 0

// Hourly data retention in days
HourlyDataRetention 48

// Top 10 data retention in days
Top10DataRetention 365

// Summary data retention in days
SummaryDataRetention 365

// Estimated data retention in days
EstimatedDataRetention 365

// Month rotation day (1-28)
MonthRotateDay 1

// Offline mode
OfflineMode 0

// Use UTC time
UseUTC 0

// Locale
Locale "en_US.UTF-8"

// Syslog facility
SyslogFacility "daemon"

// Enable syslog
EnableSyslog 1

// Rescan database on startup
RescanDatabaseOnStartup 0

// Disable file locking
DisableFileLocking 0
