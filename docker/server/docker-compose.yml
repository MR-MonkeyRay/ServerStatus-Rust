version: "3.8"

services:
  stat_server:
    container_name: stat_server
    build:
      context: ../..
      dockerfile: docker/server/Dockerfile
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../../config.toml:/config.toml
      - ../../stats.json:/stats.json
    ports:
      - 8080:8080
      - 9394:9394

